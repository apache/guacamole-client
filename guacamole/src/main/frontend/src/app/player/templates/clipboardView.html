<div class="guac-player-clipboard-container">

    <div class="clipboard-controls">
        <span class="clipboard-title">{{ 'PLAYER.ACTION_SHOW_CLIPBOARD_LOG' | translate }}</span>
        <button class="clipboard-export"
                ng-show="sortedEvents.length"
                ng-click="exportCsv()">{{ 'PLAYER.ACTION_EXPORT_CSV' | translate }}</button>
    </div>

    <!-- Empty state -->
    <div class="clipboard-empty" ng-if="!sortedEvents.length">
        {{ 'PLAYER.INFO_NO_CLIPBOARD_ACTIVITY' | translate }}
    </div>

    <!-- Chronological list of clipboard cards -->
    <div class="clipboard-cards" ng-if="sortedEvents.length">
        <div class="clipboard-card"
                ng-repeat="item in sortedEvents"
                ng-class="{ 'future': item.timestamp >= currentPosition }"
                tabindex="0"
                ng-click="seekToEvent(item)"
                ng-keydown="cardKeydown($event, item)">

            <div class="clipboard-card-header">
                <span class="timestamp">{{ item.formattedTime }}</span>
                <span class="clipboard-direction"
                        ng-class="item.directionClass"
                        aria-label="{{ item.directionLabelKey | translate }}"
                >{{ item.directionLabelKey | translate }}</span>
            </div>

            <!-- Text payload -->
            <div class="clipboard-card-body" ng-if="!item.isImage">
                <pre class="clipboard-text">{{ displayText(item) }}</pre>
                <button class="clipboard-show-more"
                        ng-if="item.truncatable"
                        ng-click="$event.stopPropagation(); toggleExpanded(item)"
                >{{ (item.expanded ? 'PLAYER.ACTION_SHOW_LESS' : 'PLAYER.ACTION_SHOW_MORE') | translate }}</button>
            </div>

            <!-- Image payload -->
            <div class="clipboard-card-body" ng-if="item.isImage">
                <span class="clipboard-image"
                        title="{{ item.mimetype }} · {{ item.sizeLabel }}{{ item.raw.width ? ' · ' + item.raw.width + '×' + item.raw.height : '' }}"
                        ng-click="$event.stopPropagation(); openImage(item.raw)">
                    <img class="clipboard-thumb"
                            ng-src="{{ item.raw.thumbURL || item.raw.dataURL }}"
                            loading="lazy" alt="Clipboard image" />
                </span>
            </div>

            <div class="clipboard-card-footer">
                <span class="clipboard-meta">{{ item.mimetype }} · {{ item.sizeLabel }}</span>
                <button class="clipboard-download"
                        ng-click="$event.stopPropagation(); download(item)"
                >{{ 'PLAYER.ACTION_DOWNLOAD' | translate }}</button>
            </div>

        </div>
    </div>

    <div class="clipboard-lightbox" ng-if="lightboxImage" ng-click="closeImage()"
            role="dialog" aria-label="Clipboard image preview">
        <img ng-src="{{ lightboxImage.dataURL }}" alt="Clipboard image" />
    </div>
</div>
