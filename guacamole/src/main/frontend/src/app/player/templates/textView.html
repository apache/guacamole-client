<div class="guac-player-text-container">

    <div class="text-controls">
        <div class="filter">
            <input class="search-string"
                placeholder="{{'PLAYER.FIELD_PLACEHOLDER_TEXT_BATCH_FILTER' | translate}}"
                type="text" ng-model="searchPhrase">
        </div>
        <span class="fullscreen-button" ng-click="toggleKeyLogFullscreen()"></span>
    </div>

    <div class="result-count"
            ng-show="searchPhrase.length"
            translate="PLAYER.INFO_NUMBER_OF_RESULTS"
            translate-values="{RESULTS: filteredBatches.length}"></div>

    <div class="text-batches">
        <div ng-repeat="batch in filteredBatches" class="text-batch" ng-click="seek({timestamp: batch.events[0].timestamp})">
            <div class="timestamp">{{ formatTime(batch.events[0].timestamp) }}</div>
            <div class="text">
                <span
                    ng-repeat="event in batch.events"
                    class="key-event"
                    ng-class="{
                        'not-typed' : !event.typed,
                        'future': event.timestamp >= currentPosition,
                        'clipboard-event': event.clipboard,
                        'clipboard-image-event': event.clipboard.isImage
                    }"
                ><span ng-if="event.clipboard.direction" class="clipboard-direction"
                    ng-class="event.clipboard.directionClass"
                    title="{{ event.clipboard.directionTitle }}"
                >{{ event.clipboard.directionLabel }}</span><span
                    ng-if="!event.clipboard.isImage">{{ event.text }}</span><span
                    ng-if="event.clipboard.isImage" class="clipboard-image"
                    title="{{ event.clipboard.mimetype }} · {{ event.clipboard.sizeLabel }}{{ event.clipboard.width ? ' · ' + event.clipboard.width + '×' + event.clipboard.height : '' }}"
                    ng-click="$event.stopPropagation(); openImage(event.clipboard)"
                ><img class="clipboard-thumb" ng-src="{{ event.clipboard.thumbURL || event.clipboard.dataURL }}"
                        loading="lazy" alt="{{ 'PLAYER.INFO_CLIPBOARD_IMAGE_ALT' | translate }}" /><span
                        class="clipboard-meta">{{ event.clipboard.mimetype }} · {{ event.clipboard.sizeLabel }}<span
                        ng-if="event.clipboard.width"> · {{ event.clipboard.width }}×{{ event.clipboard.height }}</span></span></span></span>
            </div>
        </span>
    </div>

    <div class="clipboard-lightbox" ng-if="lightboxImage" ng-click="closeImage()"
            role="dialog" tabindex="-1"
            aria-label="{{ 'PLAYER.INFO_CLIPBOARD_IMAGE_PREVIEW' | translate }}">
        <img ng-src="{{ lightboxImage.dataURL }}"
                alt="{{ 'PLAYER.INFO_CLIPBOARD_IMAGE_ALT' | translate }}" />
    </div>
</div>
