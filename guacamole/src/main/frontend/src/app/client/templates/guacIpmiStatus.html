<div class="ipmi-status-indicator" ng-if="state"
     title="{{('CLIENT.IPMI_POWER_' + (state.power | uppercase)) | translate}} &bull; {{('CLIENT.IPMI_HEALTH_' + (state.health === 'sol-connected' ? 'CONNECTED' : 'DISCONNECTED')) | translate}}">
    <span class="ipmi-power-badge" ng-class="'ipmi-power-' + state.power">
        {{('CLIENT.IPMI_POWER_' + (state.power | uppercase)) | translate}}
    </span>
</div>
